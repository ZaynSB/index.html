<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Forex Trading Bot — Client Questionnaire</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Google Sans', Roboto, Arial, sans-serif; background: #f0ebf8; min-height: 100vh; }
  .page { padding: 20px 16px 60px; max-width: 700px; margin: 0 auto; }

  .header-card {
    background: #7c4dff;
    border-radius: 12px 12px 0 0;
    padding: 28px 24px 22px;
  }
  .header-bar { height: 10px; background: #7c4dff; }
  .header-title { font-size: 28px; font-weight: 500; color: #fff; margin-bottom: 8px; }
  .header-sub { font-size: 13px; color: rgba(255,255,255,0.85); line-height: 1.6; }

  .progress-wrap {
    background: #fff;
    border: 1px solid #e0e0e0;
    border-top: none;
    border-radius: 0 0 8px 8px;
    padding: 12px 20px;
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 14px;
  }
  .step-dots { display: flex; gap: 5px; align-items: center; }
  .dot { width: 9px; height: 9px; border-radius: 50%; background: #e0e0e0; transition: background 0.2s; }
  .dot.active { background: #7c4dff; }
  .dot.done { background: #5dcaa5; }
  .prog-bar { flex: 1; height: 4px; background: #e0e0e0; border-radius: 2px; overflow: hidden; }
  .prog-fill { height: 100%; background: #7c4dff; border-radius: 2px; transition: width 0.4s ease; }
  .prog-label { font-size: 12px; color: #5f6368; min-width: 48px; text-align: right; }

  .section-header {
    background: #fff;
    border: 1px solid #e0e0e0;
    border-left: 6px solid #7c4dff;
    border-radius: 8px;
    padding: 18px 20px;
    margin-bottom: 12px;
  }
  .section-title { font-size: 16px; font-weight: 500; color: #1f1f1f; }

  .q-card {
    background: #fff;
    border: 1px solid #e0e0e0;
    border-radius: 8px;
    padding: 22px 20px;
    margin-bottom: 12px;
    transition: border-color 0.2s;
  }
  .q-card.error { border-color: #c62828; }
  .q-label { font-size: 15px; color: #1f1f1f; margin-bottom: 18px; line-height: 1.5; }
  .q-required { color: #c62828; margin-left: 3px; }

  .radio-group { display: flex; flex-direction: column; gap: 2px; }
  .radio-opt {
    display: flex; align-items: center; gap: 14px;
    padding: 10px 12px; border-radius: 4px; cursor: pointer;
    transition: background 0.1s;
  }
  .radio-opt:hover { background: #f5f0ff; }
  .radio-circle {
    width: 20px; height: 20px; border-radius: 50%;
    border: 2px solid #757575; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    transition: border-color 0.15s;
  }
  .radio-circle.checked { border-color: #7c4dff; }
  .radio-dot {
    width: 10px; height: 10px; border-radius: 50%;
    background: #7c4dff; display: none;
  }
  .radio-circle.checked .radio-dot { display: block; }
  .radio-label { font-size: 14px; color: #1f1f1f; }

  .text-input {
    width: 100%; border: none;
    border-bottom: 1px solid #9e9e9e;
    padding: 8px 0; font-size: 14px; color: #1f1f1f;
    background: transparent; outline: none;
    font-family: inherit; transition: border-color 0.2s;
  }
  .text-input:focus { border-bottom: 2px solid #7c4dff; }
  .text-input::placeholder { color: #9e9e9e; }

  textarea.text-input {
    border: 1px solid #9e9e9e; border-radius: 4px;
    padding: 10px 12px; resize: vertical; min-height: 90px;
    margin-top: 4px;
  }
  textarea.text-input:focus { border: 2px solid #7c4dff; }

  .error-msg { font-size: 12px; color: #c62828; margin-top: 10px; display: none; }
  .error-msg.show { display: block; }

  .btn-row {
    display: flex; justify-content: space-between;
    align-items: center; margin-top: 4px;
  }
  .btn {
    padding: 10px 26px; border-radius: 4px;
    font-size: 14px; font-weight: 500; cursor: pointer;
    border: none; font-family: inherit; transition: background 0.15s, opacity 0.15s;
  }
  .btn-next { background: #7c4dff; color: #fff; }
  .btn-next:hover { background: #6535ff; }
  .btn-back { background: transparent; color: #7c4dff; border: 1px solid #7c4dff; }
  .btn-back:hover { background: #f3e8ff; }
  .btn-submit { background: #7c4dff; color: #fff; }
  .btn-submit:hover { background: #6535ff; }

  .done-card {
    background: #fff; border: 1px solid #e0e0e0;
    border-radius: 8px; padding: 36px 24px; text-align: center;
  }
  .done-icon {
    width: 60px; height: 60px; background: #e8f5e9; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 18px;
  }
  .done-title { font-size: 22px; font-weight: 500; color: #1f1f1f; margin-bottom: 8px; }
  .done-sub { font-size: 14px; color: #5f6368; line-height: 1.6; margin-bottom: 20px; }

  .chip-row { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin-bottom: 20px; }
  .chip { padding: 6px 16px; background: #f3e8ff; color: #4a148c; border-radius: 20px; font-size: 12px; font-weight: 500; }

  .summary-section { text-align: left; border-top: 1px solid #e0e0e0; padding-top: 16px; }
  .summary-row { padding: 9px 0; border-bottom: 1px solid #f5f5f5; }
  .summary-q { font-size: 12px; color: #5f6368; margin-bottom: 2px; }
  .summary-a { font-size: 14px; color: #1f1f1f; font-weight: 500; }

  .done-btns { display: flex; gap: 10px; justify-content: center; margin-top: 24px; flex-wrap: wrap; }

  @media (max-width: 480px) {
    .page { padding: 12px 10px 50px; }
    .header-card { padding: 22px 18px 18px; }
    .header-title { font-size: 22px; }
    .q-card { padding: 18px 16px; }
    .btn { padding: 10px 18px; font-size: 13px; }
  }
</style>
</head>
<body>

<div class="page">

  <div class="header-card">
    <div class="header-title">Forex Trading Bot</div>
    <div class="header-title" style="font-size:18px;margin-top:-4px;margin-bottom:10px">Client Questionnaire</div>
    <div class="header-sub">Please answer all questions honestly. Your responses help me build a bot tailored exactly to your trading style and goals.</div>
  </div>
  <div class="header-bar"></div>

  <div class="progress-wrap">
    <div class="step-dots" id="dots"></div>
    <div class="prog-bar"><div class="prog-fill" id="prog"></div></div>
    <div class="prog-label" id="prog-label">0 of 5</div>
  </div>

  <div id="form-wrap"></div>
  <div class="btn-row" id="btn-row"></div>

</div>

<script>
const sections = [
  {
    title: "Section 1 of 5 — Basic profile",
    questions: [
      { key:"experience", label:"How long have you been trading Forex?", type:"radio", required:true,
        opts:["Less than 6 months","6 months – 1 year","1 – 3 years","3+ years"] },
      { key:"capital", label:"What is your current monthly trading capital?", type:"radio", required:true,
        opts:["Under $500","$500 – $2,000","$2,000 – $10,000","Above $10,000"] }
    ]
  },
  {
    title: "Section 2 of 5 — Trading style",
    questions: [
      { key:"style", label:"How would you describe your trading style?", type:"radio", required:true,
        opts:["Scalping (seconds to minutes)","Day trading (intraday)","Swing trading (days to weeks)","Position trading (weeks to months)"] },
      { key:"session", label:"Which session(s) do you actively trade?", type:"radio", required:true,
        opts:["Asian session","London session","New York session","Multiple sessions"] },
      { key:"pairs", label:"Which currency pairs do you focus on?", type:"text", required:true,
        placeholder:"e.g. EUR/USD, GBP/JPY, Gold..." }
    ]
  },
  {
    title: "Section 3 of 5 — Pain points",
    questions: [
      { key:"hours", label:"How many hours per day do you spend watching charts?", type:"radio", required:true,
        opts:["1 – 2 hours","2 – 4 hours","4 – 6 hours","6+ hours"] },
      { key:"missed", label:"Have you ever missed a good trade because you were asleep, busy, or away?", type:"radio", required:true,
        opts:["Rarely","Sometimes","Often","Almost every week"] },
      { key:"challenge", label:"What is your biggest challenge as a trader right now?", type:"radio", required:true,
        opts:["Emotional decisions (fear / greed)","Missing trades while offline","Inconsistent execution","Not enough time to monitor markets"] }
    ]
  },
  {
    title: "Section 4 of 5 — Automation readiness",
    questions: [
      { key:"rules", label:"Do you have a defined, rule-based strategy with specific entry and exit conditions?", type:"radio", required:true,
        opts:["Yes, very clearly defined","Mostly defined, some discretion","Partially defined","No fixed rules yet"] },
      { key:"prior", label:"Have you used any trading bots or automation tools before?", type:"radio", required:true,
        opts:["Yes, with good results","Yes, but bad experience","Tried briefly","Never"] }
    ]
  },
  {
    title: "Section 5 of 5 — Goals",
    questions: [
      { key:"goal", label:"What would a successful AI trading bot mean for you?", type:"radio", required:true,
        opts:["More free time (less screen time)","Better trade execution","Consistent results 24/7","All of the above"] },
      { key:"notes", label:"Anything else? Goals, concerns, or specific needs:", type:"textarea", required:false,
        placeholder:"Write freely — this helps me build exactly what you need..." }
    ]
  }
];

const answers = {};
let current = 0;

function buildDots() {
  const d = document.getElementById('dots');
  d.innerHTML = '';
  sections.forEach((_, i) => {
    const dot = document.createElement('div');
    dot.className = 'dot' + (i === current ? ' active' : i < current ? ' done' : '');
    d.appendChild(dot);
  });
}

function updateProgress() {
  document.getElementById('prog').style.width = Math.round((current / sections.length) * 100) + '%';
  document.getElementById('prog-label').textContent = current + ' of ' + sections.length;
  buildDots();
}

function renderSection() {
  const s = sections[current];
  let html = `<div class="section-header"><div class="section-title">${s.title}</div></div>`;

  s.questions.forEach((q, qi) => {
    html += `<div class="q-card" id="qcard-${qi}">`;
    html += `<div class="q-label">${q.label}${q.required ? '<span class="q-required">*</span>' : ''}</div>`;

    if (q.type === 'radio') {
      html += '<div class="radio-group">';
      q.opts.forEach((o, oi) => {
        const checked = answers[q.key] === o;
        html += `<div class="radio-opt" onclick="pick('${q.key}','${o.replace(/'/g,"\\'")}',${qi},${oi},${q.opts.length})">
          <div class="radio-circle${checked ? ' checked' : ''}" id="rc-${qi}-${oi}">
            <div class="radio-dot"></div>
          </div>
          <span class="radio-label">${o}</span>
        </div>`;
      });
      html += '</div>';
    } else if (q.type === 'text') {
      html += `<input class="text-input" type="text" id="ti-${qi}" placeholder="${q.placeholder}" value="${answers[q.key] || ''}" oninput="answers['${q.key}']=this.value;clearErr(${qi})">`;
    } else if (q.type === 'textarea') {
      html += `<textarea class="text-input" id="ti-${qi}" placeholder="${q.placeholder}" oninput="answers['${q.key}']=this.value">${answers[q.key] || ''}</textarea>`;
    }

    html += `<div class="error-msg" id="err-${qi}">This is a required question.</div>`;
    html += '</div>';
  });

  document.getElementById('form-wrap').innerHTML = html;
  renderBtns();
  updateProgress();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function renderBtns() {
  const isLast = current === sections.length - 1;
  let html = '';
  if (current > 0) html += `<button class="btn btn-back" onclick="goBack()">Back</button>`;
  else html += '<div></div>';
  if (isLast) html += `<button class="btn btn-submit" onclick="submit()">Submit</button>`;
  else html += `<button class="btn btn-next" onclick="goNext()">Next</button>`;
  document.getElementById('btn-row').innerHTML = html;
}

function pick(key, val, qi, oi, total) {
  answers[key] = val;
  for (let i = 0; i < total; i++) {
    const rc = document.getElementById(`rc-${qi}-${i}`);
    if (rc) rc.classList.toggle('checked', i === oi);
  }
  clearErr(qi);
}

function clearErr(qi) {
  const card = document.getElementById(`qcard-${qi}`);
  const err = document.getElementById(`err-${qi}`);
  if (card) card.classList.remove('error');
  if (err) err.classList.remove('show');
}

function validate() {
  let ok = true;
  sections[current].questions.forEach((q, qi) => {
    if (q.required && !answers[q.key]) {
      ok = false;
      document.getElementById(`qcard-${qi}`).classList.add('error');
      document.getElementById(`err-${qi}`).classList.add('show');
    }
  });
  return ok;
}

function goNext() { if (validate()) { current++; renderSection(); } }
function goBack() { current--; renderSection(); }
function submit() { if (validate()) showDone(); }

function showDone() {
  document.getElementById('prog').style.width = '100%';
  document.getElementById('prog-label').textContent = '5 of 5';
  buildDots();
  document.getElementById('btn-row').innerHTML = '';

  const labels = {
    experience:"Trading experience", capital:"Trading capital",
    style:"Trading style", session:"Active session", pairs:"Currency pairs",
    hours:"Hours/day on charts", missed:"Missed trades frequency",
    challenge:"Main challenge", rules:"Strategy defined",
    prior:"Prior bot experience", goal:"Primary goal", notes:"Additional notes"
  };

  let rows = '';
  Object.keys(labels).forEach(k => {
    if (answers[k]) {
      rows += `<div class="summary-row">
        <div class="summary-q">${labels[k]}</div>
        <div class="summary-a">${answers[k]}</div>
      </div>`;
    }
  });

  let chips = '';
  ['style','session','goal'].forEach(k => {
    if (answers[k]) chips += `<span class="chip">${answers[k]}</span>`;
  });

  document.getElementById('form-wrap').innerHTML = `
    <div class="done-card">
      <div class="done-icon">
        <svg width="30" height="30" viewBox="0 0 24 24" fill="none">
          <path d="M20 6L9 17l-5-5" stroke="#2e7d32" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <div class="done-title">Form submitted!</div>
      <div class="done-sub">Thank you for completing this. Your answers will help me build you the perfect automated trading system.</div>
      <div class="chip-row">${chips}</div>
      <div class="summary-section">${rows}</div>
      <div class="done-btns">
        <button class="btn btn-back" onclick="restart()">Fill again</button>
      </div>
    </div>`;
}

function restart() {
  Object.keys(answers).forEach(k => delete answers[k]);
  current = 0;
  renderSection();
}

renderSection();
</script>
</body>
</html>
